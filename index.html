<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fretboard Trainer">
  <title>Fretboard Trainer</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Fretboard Trainer</h1>
      <select id="mode-select">
        <option value="visualiser">Visualiser</option>
        <option value="note-namer">Note Namer</option>
        <option value="note-finder">Note Finder</option>
        <option value="scale-finder">Scale Finder</option>
        <option value="arpeggio-finder">Arpeggio Finder</option>
      </select>
    </header>

    <!-- Visualiser controls -->
    <div id="visualiser-controls">
      <div class="toggle-group">
        <button id="btn-scale" class="active">Scale</button>
        <button id="btn-arpeggio">Arpeggio</button>
      </div>
      <div class="select-group">
        <div class="select-wrapper">
          <label for="root-select">Root</label>
          <select id="root-select"></select>
        </div>
        <div class="select-wrapper">
          <label for="type-select">Type</label>
          <select id="type-select"></select>
        </div>
      </div>
    </div>

    <!-- Note Namer controls -->
    <div id="note-namer-controls" hidden>
      <div class="answer-area">
        <input id="note-input" type="text" placeholder="e.g. C#, Bb, As, D"
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button id="check-btn">Check</button>
      </div>
      <div id="feedback"></div>
      <div class="namer-filters">
        <button id="btn-show-c" class="ref-toggle">Show C notes</button>
        <div class="filter-group">
          <span class="filter-label">Fret</span>
          <div class="range-inputs">
            <select id="min-fret-select"></select>
            <span class="range-sep">–</span>
            <select id="max-fret-select"></select>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label">String</span>
          <div class="range-inputs">
            <select id="min-string-select"></select>
            <span class="range-sep">–</span>
            <select id="max-string-select"></select>
          </div>
        </div>
      </div>
    </div>

    <!-- Note Finder controls -->
    <div id="note-finder-controls" hidden>
      <div class="namer-filters">
        <div class="filter-group">
          <span class="filter-label">Fret</span>
          <div class="range-inputs">
            <select id="nf-min-fret"></select>
            <span class="range-sep">–</span>
            <select id="nf-max-fret"></select>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label">String</span>
          <div class="range-inputs">
            <select id="nf-min-string"></select>
            <span class="range-sep">–</span>
            <select id="nf-max-string"></select>
          </div>
        </div>
      </div>
      <div id="nf-feedback"></div>
    </div>

    <!-- Arpeggio Finder controls -->
    <div id="arpeggio-finder-controls" hidden>
      <div class="select-group">
        <div class="select-wrapper">
          <label for="af-root-select">Root</label>
          <select id="af-root-select"></select>
        </div>
        <div class="select-wrapper">
          <label for="af-type-select">Arpeggio</label>
          <select id="af-type-select"></select>
        </div>
        <div class="select-wrapper">
          <label for="af-direction-select">Direction</label>
          <select id="af-direction-select">
            <option value="ascending">Ascending ↑</option>
            <option value="descending">Descending ↓</option>
          </select>
        </div>
      </div>
      <div id="af-feedback"></div>
    </div>

    <!-- Scale Finder controls -->
    <div id="scale-finder-controls" hidden>
      <div class="select-group">
        <div class="select-wrapper">
          <label for="sf-root-select">Root</label>
          <select id="sf-root-select"></select>
        </div>
        <div class="select-wrapper">
          <label for="sf-type-select">Scale</label>
          <select id="sf-type-select"></select>
        </div>
        <div class="select-wrapper">
          <label for="sf-direction-select">Direction</label>
          <select id="sf-direction-select">
            <option value="ascending">Ascending ↑</option>
            <option value="descending">Descending ↓</option>
          </select>
        </div>
      </div>
      <div id="sf-feedback"></div>
    </div>

    <main>
      <div id="fretboard-container">
        <svg id="fretboard"></svg>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
